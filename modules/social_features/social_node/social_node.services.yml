services:
  social_node.messenger:
    class: Drupal\social_node\Service\SocialNodeMessenger
    arguments:
      - '@session.flash_bag'
      - '@page_cache_kill_switch'
      - '@module_handler'

  Drupal\social_node\EventSubscriber\SearchApiNodeQueryAccessSubscriber:
    arguments:
      - '@logger.channel.social_node'
    tags:
      - { name: event_subscriber }

  logger.channel.social_node:
    parent: logger.channel_base
    arguments: ['social_node']
